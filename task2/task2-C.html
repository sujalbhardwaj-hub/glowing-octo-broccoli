<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Position</title>

    <style>
        

        /* Parent Container */
        .parent {
            width: 300px;
            height: 200px;
            border: 2px solid black;
            background-color: rgb(36, 108, 202);
            position: relative;
            margin-bottom: 40px;
        }

        /* Child Box */
        .child {
            width: 50px;
            height: 50px;
            background-color:red;
            position: absolute;
            top: 0;
            right: 0;
            text-align: center;
            line-height: 50px;
        }

        /* Image Container */
        .image-container {
            position: relative;
            display: inline-block;
        }

        .image-container img {
            width: 200px;
            height: 150px;
        }

        /* Notification Badge */
        .badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: red;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            text-align: center;
            line-height: 20px;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <div class="parent">
        Parent-Container
        <div class="child">Box</div>
    </div>

    <h2>Notification Badge on Image</h2>

    <div class="image-container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQqyJqe5B1X5NwOzQdoOxYy2kNELiMHRPALWrJIbj9kMw&s=10" alt="Sample Image">
        <div class="badge">3</div>
    </div>
</body>
</html>
