<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Use Case 2 - Hero Section</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            padding: 80px 0;
        }

        /* Buttons */
        .hero-section .btn {
            transition: all 0.3s ease;
        }

        .hero-section .btn:hover {
            transform: translateY(-3px);
        }

        /* Image Hover */
        .hero-section img {
            transition: all 0.4s ease;
        }

        .hero-section img:hover {
            transform: scale(1.03);
        }

        /* Mobile Responsive */
        @media (max-width:768px) {

            .hero-section {
                text-align: center;
            }

            .hero-section h1 {
                font-size: 2.5rem;
            }

        }
    </style>
</head>

<body>

    <!-- Hero Section Start -->
    <section class="hero-section d-flex align-items-center">
        <div class="container">

            <div class="row align-items-center">

                <!-- Left Side -->
                <div class="col-lg-6 text-center text-lg-start">

                    <h1 class="display-4 fw-bold mb-4">
                        Build Modern Web Applications
                    </h1>

                    <p class="lead mb-4">
                        Create responsive and professional websites using HTML5, CSS3, Bootstrap, and JavaScript.
                    </p>

                    <div>
                        <button class="btn btn-primary btn-lg me-3">
                            Get Started
                        </button>

                        <button class="btn btn-outline-light btn-lg">
                            Learn More
                        </button>
                    </div>

                </div>

                <!-- Right Side -->
                <div class="col-lg-6 text-center mt-5 mt-lg-0">

                    <img src="https://via.placeholder.com/500x350" class="img-fluid rounded shadow" alt="Hero Image">

                </div>

            </div>

        </div>
    </section>
    <!-- Hero Section End -->


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
